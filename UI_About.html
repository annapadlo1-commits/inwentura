<!DOCTYPE html>
<html lang="pl">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <?!= includeInventoryHelp_(); ?>
  <style>
    :root{--brand:#8b1e3f;--accent:#f59e0b;--bg:#f7f5f3;--surface:#fff;--line:#ded8d4;--text:#251f21;--muted:#6d6367}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    main{padding:24px}.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 20px 22px;border-radius:20px;background:linear-gradient(135deg,#fff 0%,#fff6df 100%);border:1px solid var(--line)}
    .logo{display:grid;place-items:center;width:250px;height:250px;background:transparent;filter:drop-shadow(0 10px 18px rgba(72,45,21,.18))}.logo img{display:block;width:100%;height:100%;object-fit:contain}
    h1{margin:14px 0 0;font-size:34px;line-height:1.05}.edition{margin-top:8px;color:var(--brand);font-size:12px;font-weight:800;letter-spacing:1.4px}.location{margin-top:7px;color:var(--muted);font-size:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.card{padding:13px;border:1px solid var(--line);border-radius:12px;background:var(--surface)}.label{font-size:11px;color:var(--muted);text-transform:uppercase}.value{margin-top:4px;font-weight:800}
    .note{margin-top:14px;padding:12px;border-left:4px solid var(--accent);border-radius:8px;background:#fff8e8;color:var(--muted);font-size:12px;line-height:1.45}
    .footer{display:flex;align-items:center;justify-content:space-between;margin-top:18px;color:var(--muted);font-size:12px}button{border:0;border-radius:9px;padding:10px 18px;background:var(--brand);color:#fff;font-weight:800;cursor:pointer}
  </style>
</head>
<body data-help-view="about">
  <main>
    <section class="hero">
      <div class="logo"><img src="<?!= HtmlService.createHtmlOutputFromFile('UI_AboutLogoData').getContent(); ?>" alt="Logo Inventory PRO"></div>
      <h1>Inventory PRO</h1>
      <div class="edition">PRODUCTION EDITION</div>
      <div class="location"><?= CONFIG.LOCATION.NAME ?> · Lokal <?= CONFIG.LOCATION.NUMBER ?></div>
    </section>
    <section class="grid">
      <div class="card"><div class="label">Wersja</div><div class="value"><?= CONFIG.VERSION ?></div></div>
      <div class="card"><div class="label">Tryb</div><div class="value">Production</div></div>
      <div class="card"><div class="label">Parser</div><div class="value">Dictionary-first</div></div>
      <div class="card"><div class="label">Raportowanie</div><div class="value">XLSX + PDF</div></div>
    </section>
    <div class="note">Parser, import, końcowy przegląd, raportowanie i historia inwentaryzacji w jednym spójnym procesie.</div>
    <div class="footer"><span>Created by Anna &amp; Jurek with love ♥</span><button onclick="google.script.host.close()">Zamknij</button></div>
  </main>
</body>
</html>
