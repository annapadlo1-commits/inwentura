<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root{--tomato:#d84315;--cheese:#f9a825;--green:#2e7d32;--cream:#fffaf2;--line:#e6e6e6;--text:#202124}
    *{box-sizing:border-box} body{font-family:Arial,sans-serif;margin:0;background:var(--cream);color:var(--text)}
    header{display:flex;align-items:center;gap:14px;padding:18px 22px;background:white;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
    .pizza{font-size:42px}.title h1{font-size:22px;margin:0}.title p{margin:4px 0 0;color:#666;font-size:13px}
    main{padding:18px 22px}.cards{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:10px;margin-bottom:16px}
    .card{background:white;border:1px solid var(--line);border-radius:12px;padding:13px}.card b{font-size:24px;display:block;margin-top:5px}.card.warn b{color:#b06000}.card.bad b{color:#c5221f}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:white;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
    input[type=search],textarea,select{border:1px solid #ccc;border-radius:8px;padding:9px;font:inherit}input[type=search]{min-width:280px}.spacer{flex:1}
    button{border:0;border-radius:9px;padding:10px 15px;font-weight:700;cursor:pointer}.primary{background:var(--tomato);color:white}.secondary{background:#f1f3f4}.green{background:var(--green);color:white}button:disabled{opacity:.55;cursor:not-allowed}
    .table-wrap{background:white;border:1px solid var(--line);border-radius:12px;overflow:auto;max-height:430px}table{border-collapse:collapse;width:100%;font-size:13px}th,td{padding:9px;border-bottom:1px solid #eee;text-align:left;white-space:nowrap}th{background:#fff2cc;position:sticky;top:0;z-index:2}tr.flagged{background:#fff8e1}tr.missing{background:#fce8e6}
    td input.value{width:86px;border:1px solid #ccc;border-radius:6px;padding:6px}.flags{white-space:normal;min-width:190px}.pill{display:inline-block;padding:3px 7px;border-radius:999px;background:#fce8e6;color:#c5221f;margin:2px;font-size:11px}
    .status{margin-top:12px;padding:12px;border-radius:9px;display:none}.status.show{display:block}.status.ok{background:#e6f4ea;color:#137333}.status.error{background:#fce8e6;color:#c5221f}
    .links a{display:inline-block;margin-right:12px;color:#0b57d0}.loading{padding:80px;text-align:center;font-size:18px}
    @media(max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}header{position:static}}
  .readonly-value{display:inline-flex;flex-direction:column;margin:0 10px 6px 0;padding:6px 9px;border:1px solid #e0e0e0;border-radius:8px;background:#fafafa}.readonly-value small{color:#666}.readonly-value b{font-size:14px}</style>
  <?!= includeInventoryUiTheme_(); ?>
</head>
<body>
<header><div class="pizza">🍕</div><div class="title"><h1>Inventory PRO — końcowy przegląd</h1><p>Sprawdź wyniki, popraw wartości i wygeneruj profesjonalny plik Excel oraz raport PDF.</p></div></header>
<main>
  <div id="loading" class="loading">Ładuję podsumowanie…</div>
  <div id="app" hidden>
    <section class="cards">
      <div class="card">Produkty<b id="products">0</b></div>
      <div class="card">Uzupełnione<b id="completed">0</b></div>
      <div class="card bad">Brak wartości<b id="missing">0</b></div>
      <div class="card warn">Ostrzeżenia<b id="warnings">0</b></div>
      <div class="card">Nowe produkty<b id="newProducts">0</b></div>
    </section>
    <section class="toolbar"><label><b>Arkusz:</b> <select id="sourceSheet" onchange="changeSource()"></select></label>
      <input id="search" type="search" placeholder="Szukaj produktu lub kategorii…" oninput="renderRows()">
      <label><input id="onlyIssues" type="checkbox" onchange="renderRows()"> Tylko wymagające uwagi</label>
      <div class="spacer"></div>
      <button class="secondary" onclick="reloadData()">Odśwież</button>
      <button class="green" id="saveCorrections" onclick="saveCorrections()" disabled style="display:none">Zapisz poprawki</button>
      <label><input id="includePdf" type="checkbox" checked> Raport PDF</label><button class="primary" id="exportBtn" onclick="finalizeExport()">Zakończ i eksportuj XLSX + PDF</button>
    </section>
    <section class="table-wrap"><table><thead><tr><th>Eksport</th><th>Kategoria</th><th>Produkt</th><th>Typ</th><th>Wartości</th><th>Status</th></tr></thead><tbody id="rows"></tbody></table></section>
    <p style="margin-bottom:6px"><b>Notatka do eksportu</b></p><textarea id="note" rows="2" style="width:100%" placeholder="Opcjonalna notatka dla osoby przeglądającej raport"></textarea>
    <div id="status" class="status"></div>
  </div>
</main>
<script>
let data=null; const edits={};
function formatValue(v){const n=Number(v);return Number.isFinite(n)?new Intl.NumberFormat('pl-PL',{maximumFractionDigits:3}).format(n):v;}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function load(){google.script.run.withSuccessHandler(setSources).withFailureHandler(showError).getFinalReviewSources();}
function setSources(sources){const sel=document.getElementById('sourceSheet');const previous=sel.value;sel.innerHTML=sources.map(s=>`<option value="${esc(s.name)}">${esc(s.name)}${s.current?' — bieżąca':''}</option>`).join('');if(previous&&sources.some(s=>s.name===previous))sel.value=previous;loadSelected();}
function loadSelected(){const name=document.getElementById('sourceSheet').value||'Inwentura';google.script.run.withSuccessHandler(setData).withFailureHandler(showError).getFinalReviewData(name);}
function changeSource(){Object.keys(edits).forEach(k=>delete edits[k]);document.getElementById('loading').hidden=false;document.getElementById('app').hidden=true;loadSelected();}
function reloadData(){document.getElementById('loading').hidden=false;document.getElementById('app').hidden=true;loadSelected();}
function setData(result){data=result;document.getElementById('loading').hidden=true;document.getElementById('app').hidden=false;document.getElementById('products').textContent=result.summary.products;document.getElementById('completed').textContent=result.summary.completed;document.getElementById('missing').textContent=result.summary.missing;document.getElementById('warnings').textContent=result.summary.warningProducts;document.getElementById('newProducts').textContent=result.newProducts.length;document.getElementById('saveCorrections').disabled=!result.isCurrentInventory;document.getElementById('exportBtn').textContent=result.isCurrentInventory?'Zakończ i eksportuj XLSX + PDF':'Generuj ponownie XLSX + PDF';renderRows();}
function renderRows(){
  const q=document.getElementById('search').value.toLowerCase();
  const only=document.getElementById('onlyIssues').checked;
  const tbody=document.getElementById('rows');
  tbody.innerHTML='';
  data.items.filter(x=>{
    const hit=(x.product+' '+x.category).toLowerCase().includes(q);
    return hit&&(!only||x.flags.length);
  }).forEach(item=>{
    const tr=document.createElement('tr');
    tr.className=item.flags.includes('BRAK WARTOŚCI')?'missing':(item.flags.length?'flagged':'');
    const editable=item.cells||{};
    const valueOrder=item.type==='LOCATION'?['Magazyn','Lodówki','Darkroom','Stan końcowy']:(item.type==='KEG'?['Waga brutto','Waga pustego kega','Otwarty keg netto','Pełne kegi','Pojemność kega','Pełne kegi w l','Stan końcowy']:['Waga brutto','Waga pustej butelki','Otwarta zawartość netto','PREP netto','Pełne butelki','Pojemność butelki','Pełne butelki w l','Stan końcowy']);
    const vals=valueOrder.filter(label=>Object.prototype.hasOwnProperty.call(item.values,label)).map(label=>{
      const a1=editable[label];
      const value=a1&&edits[a1]!==undefined?edits[a1]:item.values[label];
      if(a1){
        return `<label style="display:inline-block;margin-right:8px">${esc(label)}<br><input class="value" ${data.isCurrentInventory?'':'disabled'} data-a1="${esc(a1)}" value="${esc(value)}" onchange="editValue(this)"></label>`;
      }
      return `<span class="readonly-value"><small>${esc(label)}</small><b>${esc(value===''?'—':formatValue(value))}</b></span>`;
    }).join('');
    const flags=item.flags.length?item.flags.map(f=>`<span class="pill">${esc(f)}</span>`).join(''):'OK';
    tr.innerHTML=`<td><input type="checkbox" class="include" data-key="${esc(item.key)}" checked></td><td>${esc(item.category)}</td><td><b>${esc(item.product)}</b></td><td>${esc(item.type)}</td><td>${vals}</td><td class="flags">${flags}</td>`;
    tbody.appendChild(tr);
  });
}
function editValue(el){edits[el.dataset.a1]=el.value;}
function corrections(){return Object.keys(edits).map(a1=>({a1,value:edits[a1]}));}
function saveCorrections(){toggleBusy(true);google.script.run.withSuccessHandler(r=>{showStatus('Zapisano poprawki: '+r.updated,'ok');Object.keys(edits).forEach(k=>delete edits[k]);reloadData();toggleBusy(false);}).withFailureHandler(e=>{showError(e);toggleBusy(false);}).applyFinalReviewCorrections(corrections(),data.sourceSheetName);}
function finalizeExport(){if(!confirm(data.isCurrentInventory?'Zakończyć inwentaryzację, utworzyć archiwum i wygenerować osobny plik XLSX?':'Wygenerować ponownie eksport dla wybranego arkusza archiwalnego?'))return;const excluded=[...document.querySelectorAll('.include:not(:checked)')].map(x=>x.dataset.key);toggleBusy(true);showStatus('Generuję Excel PRO i raport PDF. To może potrwać kilkanaście sekund…','ok');google.script.run.withSuccessHandler(r=>{const pdf=r.pdfUrl?`<a href="${esc(r.pdfUrl)}" target="_blank">Otwórz raport PDF</a>`:'';showStatus(`<b>Gotowe — ${esc(r.exportId)}</b><div class="links" style="margin-top:8px"><a href="${esc(r.xlsxUrl)}" target="_blank">Otwórz plik XLSX</a>${pdf}<a href="${esc(r.spreadsheetUrl)}" target="_blank">Otwórz wersję Google Sheets</a></div>`,'ok',true);toggleBusy(false);}).withFailureHandler(e=>{showError(e);toggleBusy(false);}).finalizeInventoryAndExport({corrections:corrections(),excludedProductKeys:excluded,note:document.getElementById('note').value,sourceSheetName:data.sourceSheetName,includePdf:document.getElementById('includePdf').checked});}
function toggleBusy(on){document.getElementById('exportBtn').disabled=on;document.getElementById('saveCorrections').disabled=on;}
function showStatus(msg,type,html){const el=document.getElementById('status');el.className='status show '+type;if(html)el.innerHTML=msg;else el.textContent=msg;}
function showError(e){showStatus((e&&e.message)||String(e),'error');document.getElementById('loading').hidden=true;}
load();
</script>
</body>
</html>
