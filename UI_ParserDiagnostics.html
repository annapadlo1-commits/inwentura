<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= includeInventoryUiTheme_(); ?>
  <?!= includeInventoryHelp_(); ?>
  <style>
    *{box-sizing:border-box}body{margin:0}.app{height:100vh;display:grid;grid-template-rows:auto auto 1fr;background:var(--ip-bg)}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px 18px;background:#fff;border-bottom:1px solid var(--ip-border)}
    textarea{width:100%;min-height:92px;padding:11px;resize:vertical}.toolbar-actions{display:flex;flex-direction:column;gap:8px;justify-content:flex-end}.toolbar button{padding:10px 15px;border:0;font-weight:800;cursor:pointer}
    .metrics{display:flex;gap:8px;flex-wrap:wrap;padding:10px 18px;background:#fff;border-bottom:1px solid var(--ip-border)}.metric{padding:7px 10px;border-radius:999px;background:#f1ece9;font-size:12px}
    .content{overflow:auto;padding:16px 18px}.grid{display:grid;grid-template-columns:.72fr 1.28fr;gap:14px}.panel{background:#fff;border:1px solid var(--ip-border);border-radius:12px;overflow:hidden}.panel h2{font-size:15px;margin:0;padding:12px 14px;background:#fff8f4;border-bottom:1px solid var(--ip-border)}
    .panel-body{padding:12px;max-height:570px;overflow:auto}.tokens{display:flex;gap:6px;flex-wrap:wrap}.token{padding:5px 8px;border-radius:7px;background:#f1f3f4;font-size:12px}.token.NUMBER{background:#fff4d6;color:#8a5900}.token.LOCATION{background:#eee4f5;color:#6f2b82}
    table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left;vertical-align:top}th{position:sticky;top:0;background:#fff;z-index:1}.ok{color:var(--ip-success);font-weight:800}.warn{color:var(--ip-warning);font-weight:800}.bad{color:var(--ip-danger);font-weight:800}.candidates{font-size:11px;color:var(--ip-muted);margin-top:5px}.empty{padding:30px;text-align:center;color:var(--ip-muted)}
    @media(max-width:850px){.grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.toolbar-actions{flex-direction:row}}
  </style>
</head>
<body data-help-view="diagnostics">
<div class="app">
  <div class="ip-app-header"><div class="ip-app-logo">🧪</div><div><div class="ip-app-title">Diagnostyka Parsera</div><div class="ip-app-subtitle">Tokeny, granice produktów, kandydaci i czasy wykonania</div></div></div>
  <div class="toolbar"><textarea id="source" placeholder="Wklej problematyczny tekst, np. Osco 2 years 22 Bacardi 8 0,987"></textarea><div class="toolbar-actions"><button class="primary" onclick="analyze()">Uruchom diagnostykę</button><button class="secondary" onclick="google.script.host.close()">Zamknij</button></div></div>
  <div class="content"><div id="metrics" class="metrics" style="display:none"></div><div class="grid"><section class="panel"><h2>Tokeny wejściowe</h2><div id="tokens" class="panel-body"><div class="empty">Najpierw uruchom diagnostykę.</div></div></section><section class="panel"><h2>Rozpoznane pozycje</h2><div id="items" class="panel-body"><div class="empty">Brak wyników.</div></div></section></div></div>
</div>
<script>
  function analyze(){const value=source.value.trim();if(!value)return;items.innerHTML='<div class="empty">Analizowanie…</div>';google.script.run.withSuccessHandler(render).withFailureHandler(error=>{items.innerHTML='<div class="empty bad">'+esc(error&&error.message?error.message:error)+'</div>'}).getParserDiagnostics(value)}
  function render(data){metrics.style.display='flex';const m=data.performance||{};metrics.innerHTML=[`Wersja <b>${esc(data.version)}</b>`,`Tokeny <b>${data.tokenCount}</b>`,`Pozycje <b>${data.itemCount}</b>`,`Parser <b>${m.parserMs||0} ms</b>`,`Łącznie <b>${m.totalMs||0} ms</b>`,`Shortlista fuzzy <b>${m.matcher&&m.matcher.fuzzyShortlisted||0}</b>`,`Levenshtein <b>${m.matcher&&m.matcher.levenshteinCandidates||0}</b>`].map(x=>`<span class="metric">${x}</span>`).join('');tokens.innerHTML='<div class="tokens">'+data.tokens.map(t=>`<span class="token ${t.type}" title="${esc(t.type)}${t.value!==''?' = '+esc(t.value):''}">${esc(t.text)}</span>`).join('')+'</div>';items.innerHTML=data.items.length?`<table><thead><tr><th>#</th><th>Wpis</th><th>Parser</th><th>Dopasowanie</th><th>Wartość / lokalizacja</th></tr></thead><tbody>${data.items.map(row=>`<tr><td>${row.id}</td><td>${esc(row.originalInput)}</td><td><b>${esc(row.parsedProduct||'—')}</b><br><span class="${row.parserStatus==='OK'?'ok':'bad'}">${esc(row.parserStatus)}</span><div class="candidates">${esc(row.parserMessage||'')}</div></td><td><span class="${row.matchStatus==='EXACT'||row.matchStatus==='ALIAS'||row.matchStatus==='SMART'?'ok':row.matchStatus==='AMBIGUOUS'?'warn':'bad'}">${esc(row.matchStatus)} ${row.score?row.score+' pkt':''}</span><br><b>${esc(row.selectedProduct||'—')}</b><div class="candidates">${row.candidates.map(c=>esc(c.name)+' ('+c.score+')').join('<br>')}</div></td><td>${row.value===null?'—':esc(row.value)}<br>${esc(row.location||'—')}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Parser nie zwrócił pozycji.</div>'}
  function esc(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
</body>
</html>
